[context.dev.environment]
  BROWSER = "none"

[dev]
  targetPort = 3000

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions]
  external_node_modules = ["@sparticuz/chromium"]
  included_files = ["src/songify/*"]
